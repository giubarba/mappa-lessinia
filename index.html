<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Mappa Lessinia Professionale</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <!-- Carichiamo le librerie per la mappa -->
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://api.maptiler.com/maps/019df264-fca7-7199-9a67-7feac9277de9/style.json?key=XdbX0zpBOhaNfNO40BUA', 
            center: [11.02, 45.62], // Coordinate Lessinia
            zoom: 11
        });

        map.on('load', () => {
            // --- LIVELLO 1: CONFINI LESSINIA ---
            map.addSource('dati-lessinia', {
                'type': 'geojson',
                'data': './Confini Lessinia.geojson'
            });

            map.addLayer({
                'id': 'livello-lessinia',
                'type': 'line',
                'source': 'dati-lessinia',
                'paint': {
                    'line-color': '#e63946', // Rosso per i confini
                    'line-width': 3
                }
            });

            // --- LIVELLO 2: GROTTE LESSINIA ---
            map.addSource('grotte-lessinia', {
                'type': 'geojson',
                'data': './Grotte_Lessinia.geojson' 
            });

            map.addLayer({
                'id': 'livello-grotte',
                'type': 'circle', // Usiamo 'circle' perché le grotte sono punti
                'source': 'grotte-lessinia',
                'paint': {
                    'circle-radius': 5,
                    'circle-color': '#7b2cbf', // Viola scuro per le grotte
                    'circle-stroke-width': 2,
                    'circle-stroke-color': '#ffffff'
                }
            });
        });
    </script>
</body>
</html>
