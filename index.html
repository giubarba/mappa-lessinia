<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Mappa Lessinia Professionale</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Stile del Pannello di Controllo */
        .console {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1;
        }
        .console h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .item { margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; }
        .item input { margin-right: 10px; cursor: pointer; }
        
        .maplibregl-popup-content { padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- Pannello di attivazione/disattivazione -->
    <div class="console">
        <h3>Livelli Mappa</h3>
        <div class="item">
            <input type="checkbox" id="check-confini" checked>
            <label for="check-confini">Confini Parco</label>
        </div>
        <div class="item">
            <input type="checkbox" id="check-grotte" checked>
            <label for="check-grotte">Grotte</label>
        </div>
        <div class="item">
            <input type="checkbox" id="check-picnic" checked>
            <label for="check-picnic">Aree Picnic</label>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://api.maptiler.com/maps/019df264-fca7-7199-9a67-7feac9277de9/style.json?key=XdbX0zpBOhaNfNO40BUA', 
            center: [11.02, 45.62], 
            zoom: 11
        });

        map.on('load', () => {
            // --- SORGENTE E LIVELLO: CONFINI ---
            map.addSource('source-confini', { 'type': 'geojson', 'data': './Confini Lessinia.geojson' });
            map.addLayer({
                'id': 'livello-lessinia',
                'type': 'line',
                'source': 'source-confini',
                'paint': { 'line-color': '#e63946', 'line-width': 3 }
            });

            // --- SORGENTE E LIVELLO: GROTTE ---
            map.addSource('source-grotte', { 'type': 'geojson', 'data': './Grotte_Lessinia.geojson' });
            map.addLayer({
                'id': 'livello-grotte',
                'type': 'symbol',
                'source': 'source-grotte',
                'layout': {
                    'icon-image': 'cave_entrance',
                    'icon-size': 1.3,
                    'text-field': ['get', 'name'],
                    'text-size': 10,
                    'text-offset': [0, 1.5],
                    'text-anchor': 'top'
                },
                'paint': { 'text-halo-color': '#fff', 'text-halo-width': 1.5 }
            });

            // --- SORGENTE E LIVELLO: PICNIC ---
            map.addSource('source-picnic', { 'type': 'geojson', 'data': './Picnic_Lessinia.geojson' });
            map.addLayer({
                'id': 'livello-picnic',
                'type': 'symbol',
                'source': 'source-picnic',
                'layout': {
                    'icon-image': 'picnic_site',
                    'icon-size': 1.2,
                    'text-field': ['get', 'name'],
                    'text-size': 10,
                    'text-offset': [0, 1.5],
                    'text-anchor': 'top'
                },
                'paint': { 'text-halo-color': '#fff', 'text-halo-width': 1.5 }
            });
        });

        // LOGICA DEL PANNELLO (Accendi/Spegni)
        const toggleLayer = (idCheckbox, idLayer) => {
            document.getElementById(idCheckbox).addEventListener('change', (e) => {
                map.setLayoutProperty(
                    idLayer,
                    'visibility',
                    e.target.checked ? 'visible' : 'none'
                );
            });
        };

        // Colleghiamo i checkbox ai rispettivi layer
        toggleLayer('check-confini', 'livello-lessinia');
        toggleLayer('check-grotte', 'livello-grotte');
        toggleLayer('check-picnic', 'livello-picnic');

        // GESTIONE CLICK
        map.on('click', (e) => {
            const features = map.queryRenderedFeatures(e.point, {
                layers: ['livello-grotte', 'livello-lessinia', 'livello-picnic']
            });
            if (!features.length) return;
            const props = features[0].properties;
            new maplibregl.Popup()
                .setLngLat(e.lngLat)
                .setHTML(`<strong>${props.name || "Senza nome"}</strong>`)
                .addTo(map);
        });

        // Cambio cursore
        const layers = ['livello-grotte', 'livello-picnic'];
        layers.forEach(layer => {
            map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
        });
    </script>
</body>
</html>
