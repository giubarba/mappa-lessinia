<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Mappa Lessinia Professionale</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <!-- Carichiamo le librerie per la mappa -->
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            // Stile di base (gratuito senza chiavi per ora)
            style: 'https://demotiles.maplibre.org/style.json', 
            center: [11.02, 45.62], // Coordinate Lessinia
            zoom: 11
        });

        map.on('load', () => {
            // Qui carichiamo il TUO file che hai appena caricato su GitHub
            map.addSource('dati-lessinia', {
                'type': 'geojson',
                'data': './Confini Lessinia.geojson' // <-- SOSTITUISCI CON IL NOME ESATTO DEL TUO FILE
            });

            map.addLayer({
                'id': 'livello-lessinia',
                'type': 'line', // 'line' per i sentieri, 'circle' per i punti
                'source': 'dati-lessinia',
                'paint': {
                    'line-color': '#e63946',
                    'line-width': 3
                }
            });
        });
    </script>
</body>
</html>
